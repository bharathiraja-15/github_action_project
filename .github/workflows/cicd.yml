name: CICD

on:
  push:
    branches: [ "main" ]

jobs:

  compile:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile


  test:
    runs-on: self-hosted
    needs: compile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test


  security-check:
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy (Amazon Linux)
        run: |
          sudo dnf install -y wget gnupg
          sudo rpm -ivh https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.rpm || true

      - name: Trivy FS Scan
        run: trivy fs --format table -o trivy-report.txt .

      - name: Install Gitleaks
        run: |
          sudo dnf install -y gitleaks || true

      - name: Run Gitleaks Scan
        run: gitleaks detect --source . --report-format json --report-path gitleaks-report.json
